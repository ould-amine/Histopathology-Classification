seed: 0
epochs: 30
patience: 6

matmul_precision: high
precision: 16-mixed

optimizer: AdamW
weight_decay: 0.01

loss: BCEWithLogitsLoss
min_lr: 1.0e-6

lr:
  classifier: 1e-3
  backbone_a: 1e-5
  backbone_b: 5e-5

gradient_clip_val: 1.0
accumulate_grad_batches: 1

ema:
  enabled: False
  decay: 0.999








