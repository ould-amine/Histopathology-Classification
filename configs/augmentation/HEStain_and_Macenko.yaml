HEStain:
  enabled: true
  intensity_scale_range: 0.4
  intensity_shift_range: 0.3
  p: 0.8

HistoNormalization:
  enabled: true
  p: 1.0
  method: Macenko
  n_images: 1
  validation: true

ColorJitter:
  brightness: 0.25
  contrast: 0.25
  saturation: 0.2
  hue: 0.06
  p: 0.8

GaussNoise:
  p: 0.15

GaussianBlur:
  p: 0.15

ImageCompression:
  p: 0.1

name: HEStain_augmentation_and_normalization